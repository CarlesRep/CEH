<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000000;
            --surface: #111111;
            --surface-raised: #1c1c1e;
            --surface-high: #2c2c2e;
            --border: rgba(255,255,255,0.1);
            --border-bright: rgba(255,255,255,0.15);

            --accent: #2997ff;
            --accent-dim: rgba(41,151,255,0.12);
            --accent-faint: rgba(41,151,255,0.06);

            --amber: #ff9f0a;
            --amber-dim: rgba(255,159,10,0.12);

            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --text-muted: #6e6e73;
            --text-code: #64d2ff;

            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            --radius-sm: 4px;
            --radius: 8px;
            --radius-lg: 14px;

            --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-weight: 400;
            line-height: 1.7;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== TOPBAR ===== */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 64px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
        }

        .topbar-inner {
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            align-items: center;
        }

        .wordmark {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            border: none;
            flex-shrink: 0;
        }

        .wordmark-icon {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
            flex-shrink: 0;
        }

        .wordmark-text {
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.1px;
        }

        .topbar-nav {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 40px;
        }

        .topbar-nav a {
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            border: none;
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            transition: all var(--transition);
        }

        .topbar-nav a:hover {
            color: var(--text-primary);
            background: var(--surface-raised);
        }

        .topbar-spacer {
            flex: 1;
        }

        .btn-github {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            background: var(--accent);
            text-decoration: none;
            border: none;
            padding: 7px 16px;
            border-radius: var(--radius-sm);
            transition: all var(--transition);
            font-family: var(--font-body);
        }

        .btn-github:hover {
            background: #409cff;
            transform: translateY(-1px);
        }

        /* ===== LAYOUT ===== */
        .page-wrapper {
            display: flex;
            min-height: 100vh;
            padding-top: 64px;
        }

        .main-content {
            flex: 1;
            min-width: 0;
        }

        .content-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 48px 80px;
        }

        /* ===== ARTICLE BADGE ===== */
        .article-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 500;
            color: var(--accent);
            background: var(--accent-faint);
            border: 1px solid rgba(41,151,255,0.2);
            padding: 4px 10px;
            border-radius: 100px;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .article-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
        }

        /* ===== TYPOGRAPHY ===== */
        h1 {
            font-family: var(--font-body);
            font-size: clamp(24px, 2.5vw, 32px);
            font-weight: 700;
            line-height: 1.2;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            margin: 0 0 16px;
        }

        h2 {
            font-family: var(--font-body);
            font-size: clamp(18px, 2vw, 24px);
            font-weight: 600;
            line-height: 1.3;
            color: var(--text-primary);
            letter-spacing: -0.2px;
            margin: 52px 0 14px;
            padding-top: 8px;
            position: relative;
        }

        h2::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 28px;
            height: 2px;
            background: var(--accent);
            border-radius: 1px;
        }

        h3 {
            font-family: var(--font-body);
            font-size: clamp(15px, 1.5vw, 18px);
            font-weight: 600;
            color: var(--text-primary);
            margin: 32px 0 10px;
            letter-spacing: -0.1px;
        }

        h4, h5, h6 {
            font-family: var(--font-body);
            font-size: 13.5px;
            font-weight: 600;
            color: var(--text-secondary);
            margin: 24px 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        main > h1:first-child {
            font-size: clamp(28px, 3vw, 34px);
            font-weight: 700;
            letter-spacing: -0.3px;
            line-height: 1.15;
        }

        p {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        strong {
            font-weight: 600;
            color: #ffffff;
        }

        em {
            color: var(--text-secondary);
            font-style: italic;
        }

        /* ===== LINKS ===== */
        main a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid rgba(41,151,255,0.3);
            transition: all var(--transition);
        }

        main a:hover {
            color: #409cff;
            border-bottom-color: var(--accent);
        }

        /* ===== LISTS ===== */
        ul, ol {
            margin: 0 0 20px 0;
            padding-left: 24px;
        }

        li {
            font-size: 15.5px;
            line-height: 1.7;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        ul li::marker {
            color: var(--accent);
        }

        ol li::marker {
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 13px;
        }

        /* ===== CODE ===== */
        code {
            font-family: var(--font-mono);
            font-size: 13.5px;
            font-weight: 400;
            color: var(--text-code);
            background: var(--accent-faint);
            border: 1px solid rgba(41,151,255,0.15);
            padding: 2px 7px;
            border-radius: var(--radius-sm);
        }

        pre {
            background: var(--surface);
            border: 1px solid var(--border-bright);
            border-radius: var(--radius);
            padding: 24px;
            overflow-x: auto;
            margin: 24px 0;
        }

        pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 13px;
            color: #c9d1d9;
            line-height: 1.6;
        }

        /* ===== TABLES ===== */
        .table-wrapper {
            overflow-x: auto;
            margin: 28px 0;
            border-radius: var(--radius);
            border: 1px solid var(--border-bright);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--surface-raised);
        }

        th {
            font-family: var(--font-mono);
            font-size: 11.5px;
            font-weight: 500;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border-bright);
            white-space: nowrap;
        }

        td {
            font-size: 14.5px;
            padding: 13px 20px;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover td {
            background: var(--accent-faint);
        }

        /* ===== BLOCKQUOTES ===== */
        blockquote {
            margin: 28px 0;
            padding: 20px 24px;
            background: var(--amber-dim);
            border-left: 3px solid var(--amber);
            border-radius: 0 var(--radius) var(--radius) 0;
        }

        blockquote p {
            color: #e8c06e;
            font-size: 15px;
            margin: 0;
            font-style: italic;
        }

        /* ===== HORIZONTAL RULE ===== */
        hr {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
            margin: 48px 0;
        }

        /* ===== FOOTER ===== */
        .site-footer {
            border-top: 1px solid var(--border);
            padding: 32px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-left {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
        }

        .footer-left span {
            color: var(--accent);
        }

        .footer-right {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ===== SCROLL TO TOP ===== */
        .scroll-top {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 44px;
            height: 44px;
            background: var(--surface-high);
            border: 1px solid var(--border-bright);
            border-radius: var(--radius);
            color: var(--accent);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: all var(--transition);
            z-index: 500;
        }

        .scroll-top.visible {
            opacity: 1;
            pointer-events: all;
        }

        .scroll-top:hover {
            background: var(--accent);
            color: #ffffff;
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .content-wrapper {
                padding: 40px 24px 60px;
            }
        }

        @media (max-width: 768px) {
            .topbar-nav {
                display: none;
            }

            .content-wrapper {
                padding: 28px 20px 48px;
            }

            .site-footer {
                flex-direction: column;
                gap: 8px;
                text-align: center;
                padding: 24px 20px;
            }

            h1 { font-size: 26px; }
            h2 { font-size: 20px; }
            h3 { font-size: 16px; }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--surface-high);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- ===== TOPBAR ===== -->
    <header class="topbar">
        <div class="topbar-inner">

            <a href="{{ '/' | relative_url }}" class="wordmark">
                <div class="wordmark-icon">CEH</div>
                <span class="wordmark-text">{{ site.title | default: "CEH Study" }}</span>
            </a>

            <nav class="topbar-nav">
                <a href="{{ '/' | relative_url }}">Home</a>
            </nav>

            <div class="topbar-spacer"></div>

            <a href="https://github.com/{{ site.github_user }}/{{ site.repository }}" target="_blank" class="btn-github">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                </svg>
                GitHub
            </a>

        </div>
    </header>

    <!-- ===== LAYOUT ===== -->
    <div class="page-wrapper">
        <div class="main-content">
            <div class="content-wrapper">

                {% if page.url != "/" and page.url != "/index.html" %}
                <div class="article-badge">CEH v13</div>
                {% endif %}

                {{ content }}

            </div>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="site-footer">
        <div class="footer-left">
            <span>CEH v13</span> Study Materials · Certified Ethical Hacker
        </div>
        <div class="footer-right">
            <a href="https://github.com/{{ site.github_user }}/{{ site.repository }}" target="_blank" style="color: var(--text-muted); text-decoration: none;">View on GitHub</a>
        </div>
    </footer>

    <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    <script>
        window.addEventListener('scroll', () => {
            document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 400);
        });
    </script>
</body>
</html>
